<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>LED Control</title>

<style>
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        height: 100%;
        overflow: hidden; /* ZABRÁNI scrollu */
    }

    body {
        display: flex;
        flex-direction: column;
        height: 100vh; /* presne výška obrazovky */
    }

    button {
        flex: 1;
        width: 100%;
        border: none;
        color: white;
        min-height: 0;
        cursor: pointer;
        touch-action: manipulation;
    }

    .toggle { background: #0D0D0D; }
    .dim { background: #0D0D0D; }
    .rgb { background: #0D0D0D; }
    .textin { 
	font-family: Arial, sans-serif;
        font-size: 3vh;
    }

    .sliderBox {
        flex: 1;
        background: #0D0D0D;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2vh;
        min-height: 0;    	  
	color: white;
    }

    .sliderRow {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        gap: 2vw;
        padding: 0 10px;
    }

    .smallBtn {
        width: 10vh;
        height: 10vh;
        border: none;
        background: #333;
        color: white;
        border-radius: 12px;
    }

    input[type="range"] {
        width: 60%;
        max-width: 500px;
    }
</style>
</head>

<body>

<button class="toggle" onclick="sendToggle()"><div class="textin">ON / OFF</div></button>

<div class="sliderBox">
    <div class="textin">JAS: <span id="dimValue">10</span></div>

    <div class="sliderRow">
        <button class="smallBtn" onclick="changeDim(-5)"><div class="textin">-</div></button>

        <input type="range" min="0" max="100" value="10" id="dimSlider">

        <button class="smallBtn" onclick="changeDim(5)"><div class="textin">+</div></button>
    </div>
</div>

<button class="dim" onclick="sendDimAndPwm()"><div class="textin">Jemné Svetlo</div></button>
<button class="rgb" onclick="sendRgb()"><div class="textin">Červené Svetlo</div></button>

<script>
/* =========================
   CONFIG
========================= */
const BASE = "http://192.168.1.55/index";

const CFG = {
    dimIndex: 129,
    pwmIndex: 132,
    rgbIndex: 131
};

/* =========================
   ELEMENTY
========================= */
const slider = document.getElementById("dimSlider");
const output = document.getElementById("dimValue");

/* =========================
   ULTRA ROBUST SEND (MOBILE FIX)
========================= */
function send(url, label = "") {
    console.log("SEND:", url);

    // 1. skúsi fetch
    fetch(url)
        .then(r => {
            console.log("OK FETCH:", label || url);
        })
        .catch(err => {
            console.warn("FETCH FAIL → fallback IMG:", err);

            // 2. fallback (funguje aj keď CORS blokuje fetch)
            const img = new Image();
            img.src = url;
        });
}

/* =========================
   UI HELPERS
========================= */
function updateUI(value) {
    value = clamp(value, 0, 100);
    slider.value = value;
    output.textContent = value;
}

function getDimValue() {
    return parseInt(slider.value);
}

function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
}

/* =========================
   DIM CONTROL
========================= */
function setDim(value) {
    value = clamp(parseInt(value), 0, 100);

    updateUI(value);
    sendDim(value);
}

function changeDim(step) {
    setDim(getDimValue() + step);
}

function sendDim(dimValue) {
    send(`${BASE}?dim=${dimValue}&dimIndex=${CFG.dimIndex}`, "dim");
}

/* slider behavior */
slider.addEventListener("input", function () {
    output.textContent = this.value;
});

slider.addEventListener("change", function () {
    setDim(this.value);
});

/* =========================
   BUTTON ACTIONS
========================= */
function sendToggle() {
    send(`${BASE}?tgl=130`, "toggle");
}

async function sendDimAndPwm() {
    send(`${BASE}?dim=10&dimIndex=${CFG.dimIndex}`);
    send(`${BASE}?pwmIndex=${CFG.pwmIndex}&pwm=500`);

    updateUI(10);
}

async function sendRgb() {
    send(`${BASE}?rgb=%23ff0000&rgbIndex=${CFG.rgbIndex}`);
    send(`${BASE}?dim=100&dimIndex=${CFG.dimIndex}`);

    updateUI(100);
}
</script>

</body>
</html>
